# Optional supporting services for the distributed / persistent configuration.
# The platform runs fully in-memory without these; bring them up when you
# enable the `infra` extra (Redis + Postgres + Celery workers).
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      # Local development defaults — override via a .env / shell for anything real.
      POSTGRES_USER: ${POSTGRES_USER:-recon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recon}
      POSTGRES_DB: ${POSTGRES_DB:-recon}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recon"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: uvicorn recon_platform.api.app:create_app --factory --host 0.0.0.0 --port 8000
    environment:
      RECON_REDIS_URL: redis://redis:6379/0
      RECON_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-recon}:${POSTGRES_PASSWORD:-recon}@postgres:5432/${POSTGRES_DB:-recon}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  pgdata:
